global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: monolith
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /metrics

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
