global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: users-service
    static_configs:
      - targets: ["users-service:8081"]
    metrics_path: /metrics

  - job_name: products-service
    static_configs:
      - targets: ["products-service:8082"]
    metrics_path: /metrics

  - job_name: orders-service
    static_configs:
      - targets: ["orders-service:8083"]
    metrics_path: /metrics

  - job_name: inventory-service
    static_configs:
      - targets: ["inventory-service:8084"]
    metrics_path: /metrics

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
